# Hyprland Configuration
# Translated from Sway config

###################
### VARIABLES ###
###################

$mod = SUPER
$term = alacritty
$fileManager = thunar
$browser = google-chrome
$editor = code
$menu = rofi -terminal '$term' -show combi -combi-modes drun#run -modes combi
$clipboard_history = copyq toggle

# Catppuccin Frappé Colors
$rosewater = rgb(f2d5cf)
$flamingo = rgb(eebebe)
$pink = rgb(f4b8e4)
$mauve = rgb(ca9ee6)
$red = rgb(e78284)
$maroon = rgb(ea999c)
$peach = rgb(ef9f76)
$yellow = rgb(e5c890)
$green = rgb(a6d189)
$teal = rgb(81c8be)
$sky = rgb(99d1db)
$sapphire = rgb(85c1dc)
$blue = rgb(8caaee)
$lavender = rgb(babbf1)
$text = rgb(c6d0f5)
$subtext1 = rgb(b5bfe2)
$subtext0 = rgb(a5adce)
$overlay2 = rgb(949cbb)
$overlay1 = rgb(838ba7)
$overlay0 = rgb(737994)
$surface2 = rgb(626880)
$surface1 = rgb(51576d)
$surface0 = rgb(414559)
$base = rgb(303446)
$mantle = rgb(292c3c)
$crust = rgb(232634)

################
### MONITORS ###
################

# Dual monitor setup: side by side
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1
monitor = HDMI-A-2, 1920x1080@60, 1920x0, 1

# Fallback for other monitors
monitor = , preferred, auto, 1

#################
### AUTOSTART ###
#################

exec-once = copyq
exec-once = waybar
exec-once = wlsunset -T 5000 -t 4000 -l 35.7796 -L 78.6382
exec-once = hypridle
exec-once = systemctl --user import-environment XDG_CURRENT_DESKTOP XDG_SESSION_TYPE WAYLAND_DISPLAY
exec-once = systemctl --user start graphical-session.target

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME, breeze_cursors
env = XCURSOR_SIZE, 20

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5

    border_size = 1

    # Active window border: lavender
    col.active_border = $lavender

    # Inactive window border: overlay0
    col.inactive_border = $overlay0

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 0.8

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

cursor {
    no_hardware_cursors = true
    enable_hyprcursor = false
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = numlock:on

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gestures {
    # workspace_swipe option removed in newer Hyprland versions
}

###################
### KEYBINDINGS ###
###################

# Application launchers
bind = $mod, r, exec, $menu
bind = $mod, Return, exec, $term
bind = $mod, e, exec, $fileManager
bind = $mod, l, exec, hyprlock
bind = CTRL_ALT, backslash, exec, $clipboard_history

# Window management
bind = $mod, c, killactive
bind = $mod, f, fullscreen, 0
bind = $mod SHIFT, space, togglefloating
bind = $mod, space, focuscurrentorlast

# Focus windows with arrow keys
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows with Shift + arrow keys
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Split direction (dwindle layout)
bind = $mod, b, layoutmsg, preselect l
bind = $mod, v, layoutmsg, preselect d

# Toggle layout split direction
bind = $mod, t, layoutmsg, togglesplit

# Scratchpad (special workspace)
bind = $mod, minus, togglespecialworkspace, scratchpad
bind = $mod SHIFT, minus, movetoworkspace, special:scratchpad

# Workspace switching (numbered)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move windows to workspaces (numbered)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Directional workspace navigation (fluid approach)
bind = $mod CTRL, left, workspace, e-1
bind = $mod CTRL, right, workspace, e+1

# Move windows between workspaces directionally
bind = $mod CTRL SHIFT, left, movetoworkspace, e-1
bind = $mod CTRL SHIFT, right, movetoworkspace, e+1

# Cycle through workspaces with mouse wheel
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# Audio controls
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , XF86AudioMute, exec, pactl set-mute @DEFAULT_SINK@ toggle

# Reload configuration
bind = $mod SHIFT, c, exec, hyprctl reload

# Exit Hyprland
bind = $mod, Escape, exec, rofi -dmenu -p "Exit Hyprland? (yes/no)" | grep -iq "^yes$" && hyprctl dispatch exit

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Window rules
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# Wallpapers per monitor
exec = hyprctl hyprpaper preload /usr/share/backgrounds/wallpaper.jpg
exec = hyprctl hyprpaper wallpaper "HDMI-A-1,/usr/share/backgrounds/wallpaper.jpg"
exec = hyprctl hyprpaper wallpaper "HDMI-A-2,/usr/share/backgrounds/wallpaper.jpg"
