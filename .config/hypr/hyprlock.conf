# Hyprlock Configuration
# Screen locker for Hyprland

# General settings
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# Background (Catppuccin Frappé base color)
background {
    monitor =
    path = /usr/share/backgrounds/wallpaper.jpeg
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Input field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgb(ca9ee6)  # lavender
    inner_color = rgb(303446)  # base
    font_color = rgb(c6d0f5)   # text
    fade_on_empty = false
    placeholder_text = <span foreground="##c6d0f5">Enter Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    check_color = rgb(a6d189)  # green
    fail_color = rgb(e78284)   # red
    fail_text = <span foreground="##e78284">Authentication Failed</span>
    capslock_color = rgb(ef9f76)  # peach
}

# Time label
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgb(c6d0f5)  # text
    font_size = 120
    font_family = AudioLink Mono
    position = 0, 300
    halign = center
    valign = center
}

# Date label
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgb(c6d0f5)  # text
    font_size = 24
    font_family = AudioLink Mono
    position = 0, 200
    halign = center
    valign = center
}

# User label
label {
    monitor =
    text = $USER
    color = rgb(babbf1)  # lavender
    font_size = 18
    font_family = AudioLink Mono
    position = 0, -200
    halign = center
    valign = center
}
